app = "ubuntu24-flyio-change-me"
primary_region = "ord"
kill_signal = "SIGTERM"
kill_timeout = 30
swap_size_mb = 512

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    soft_limit = 20
    hard_limit = 30

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "45s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
